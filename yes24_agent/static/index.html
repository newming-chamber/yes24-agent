<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yes24 AI 어시스턴트 · 테스트</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --border: #e5e5e8;
      --text: #1a1a1e;
      --muted: #8a8a92;
      --user-bg: #2563eb;
      --user-text: #ffffff;
      --assistant-bg: #f0f0f3;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --web: #ea580c;
      --web-soft: #ffedd5;
      --error-bg: #fee2e2;
      --error-text: #b91c1c;
      --chip-bg: #ffffff;
      --card-bg: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #17171a;
        --panel: #202024;
        --border: #313136;
        --text: #ececf0;
        --muted: #9a9aa2;
        --user-bg: #2563eb;
        --user-text: #ffffff;
        --assistant-bg: #26262b;
        --accent: #60a5fa;
        --accent-soft: #1e3a5f;
        --web: #fb923c;
        --web-soft: #3a2412;
        --error-bg: #3b1a1a;
        --error-text: #fca5a5;
        --chip-bg: #26262b;
        --card-bg: #26262b;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Noto Sans KR", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      position: relative; /* 페르소나 팝오버(absolute) 앵커 */
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      flex: 0 0 auto;
    }
    header .logo { font-size: 18px; }
    header h1 { font-size: 15px; font-weight: 600; margin: 0; }
    header .tag {
      font-size: 11px; color: var(--muted); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 999px; margin-left: 2px;
    }
    header .spacer { flex: 1; }
    header button {
      font-size: 12px; color: var(--muted); background: transparent;
      border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px;
      cursor: pointer;
    }
    header button:hover { color: var(--text); }
    /* /matrix(16유형 비교) 진입 링크 — 헤더 버튼과 동일 톤의 앵커. 배포 숨김 토글이
       없어 persona-badge와 동일하게 무조건 노출한다(가법). */
    header a.navlink {
      font-size: 12px; color: var(--muted); background: transparent;
      border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    }
    header a.navlink:hover { color: var(--text); border-color: var(--accent); }

    #conversation {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .intro { margin: auto 0; text-align: center; color: var(--muted); }
    .intro .big { font-size: 20px; color: var(--text); font-weight: 600; margin-bottom: 4px; }
    .intro p { font-size: 13px; margin: 4px 0 18px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip {
      background: var(--chip-bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 999px; padding: 8px 14px; font-size: 13px; cursor: pointer;
      transition: border-color 0.12s ease, transform 0.12s ease;
    }
    .chip:hover { border-color: var(--accent); transform: translateY(-1px); }

    /* 새 메시지 등장 — 은은한 페이드업(자연스러운 나타남, 절제). */
    .msg { display: flex; flex-direction: column; gap: 6px; animation: msgIn 0.28s ease both; }
    .msg.user { align-items: flex-end; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .bubble {
      max-width: 88%; padding: 10px 14px; border-radius: 14px; font-size: 14.5px;
      line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
    .msg.assistant .bubble { background: var(--assistant-bg); color: var(--text); border-bottom-left-radius: 4px; }
    .bubble.error { background: var(--error-bg); color: var(--error-text); }
    .bubble.empty { color: var(--muted); }
    /* 첫 델타 전 대기 = 정적 "…" 대신 부드러운 타이핑 인디케이터(살아있는 느낌). */
    .typing { display: inline-flex; gap: 4px; align-items: center; height: 1.25em; }
    .typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: typing 1.2s infinite ease-in-out; }
    .typing i:nth-child(2) { animation-delay: 0.15s; }
    .typing i:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
    /* 게이트 재검색(verifying)으로 본문이 더 정확한 답으로 교체될 때: 통째 갈아끼우는 놀람을
       줄이려 새 본문을 부드럽게 페이드인하고, 그 위에 교체를 알리는 안내줄을 붙인다. */
    .bubble.updated { animation: fadein 0.45s ease; }
    @keyframes fadein { from { opacity: 0.35; } to { opacity: 1; } }
    .update-note {
      display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--accent);
      margin-bottom: 4px; animation: fadein 0.45s ease;
    }
    .update-note .ico { font-size: 12px; }

    /* 진행 과정 블록(ChatGPT/퍼플렉시티식) — status 단계 + ack 자연어 응대를 하나의
       시간순 스트림으로 묶고, 완료 후 한 줄 요약으로 접는다(헤더 클릭 시 재확장). */
    .trace { margin-bottom: 6px; }
    .trace:empty { display: none; }
    .trace-head {
      display: flex; align-items: center; gap: 7px; width: 100%; text-align: left;
      background: transparent; border: none; padding: 4px 6px; cursor: pointer;
      font-size: 12.5px; color: var(--muted); font-family: inherit; border-radius: 7px;
    }
    .trace-head:hover { background: var(--accent-soft); }
    .trace-caret { flex: 0 0 auto; font-size: 10px; transition: transform 0.15s ease; opacity: 0.7; }
    .trace.open .trace-caret { transform: rotate(90deg); }
    /* 진행 중 스피너(펄스 점). 완료(done) 시 감추고 캐럿만 남긴다. */
    .trace-spin {
      flex: 0 0 auto; width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .trace.done .trace-spin { display: none; }
    .trace-label { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* 본문(단계·응대 스트림)은 펼침 상태에서만 보인다. */
    .trace-body { display: none; flex-direction: column; gap: 3px; padding: 3px 0 3px 18px; }
    .trace.open .trace-body { display: flex; }
    .step {
      font-size: 12.5px; color: var(--muted); display: flex; align-items: center; gap: 6px;
      line-height: 1.5; animation: fadein 0.3s ease;
    }
    .step .ico { flex: 0 0 auto; width: 15px; text-align: center; }
    .step.done .ico { color: var(--accent); }        /* 완료 단계는 체크 강조색 */
    .step.active .ico { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    /* ack 자연어 응대 — 같은 스트림에 시간순으로, 단계와 구분되게 은은한 이탤릭. */
    .ack-item {
      font-size: 12.5px; color: var(--muted); font-style: italic; line-height: 1.5;
      display: flex; align-items: flex-start; gap: 6px; animation: fadein 0.3s ease;
    }
    .ack-item .ico { flex: 0 0 auto; width: 15px; text-align: center; font-style: normal; }

    .sources { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .sources:empty { display: none; }
    .card {
      flex: 0 0 auto; max-width: 210px; background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 10px; cursor: pointer; display: flex; flex-direction: row; gap: 8px;
    }
    /* 본문 열(제목·저자·가격). 표지가 있으면 그 오른쪽, 없으면 카드 전체를 채운다. */
    .card .card-main { display: flex; flex-direction: column; gap: 4px; min-width: 0; flex: 1 1 auto; }
    /* 좌측 표지 썸네일(검색결과 image_url). 실패 시 JS가 제거해 본문만 남는다. */
    .card .cover {
      flex: 0 0 auto; width: 38px; height: 54px; object-fit: cover; border-radius: 4px;
      background: var(--border);
    }
    .card:hover { border-color: var(--accent); }
    /* 인용 확정 후: 관찰 카드는 유지하고, 실제 인용된 것만 강조(cited)·나머지는 디밍(dim). */
    .card.cited { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .card.web.cited { border-color: var(--web); box-shadow: 0 0 0 1px var(--web); }
    .card.dim { opacity: 0.5; }
    .card.dim:hover { opacity: 1; }
    .card.flash { animation: flash 1s ease; }
    @keyframes flash {
      0% { background: var(--accent-soft); border-color: var(--accent); }
      100% { background: var(--card-bg); }
    }
    .card .top { display: flex; align-items: center; gap: 6px; }
    .card .num {
      font-size: 11px; font-weight: 700; color: #fff; background: var(--accent);
      border-radius: 5px; min-width: 18px; height: 18px; display: inline-flex;
      align-items: center; justify-content: center; padding: 0 4px;
    }
    .card .type { font-size: 10px; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }
    /* 외부 웹 출처: Yes24 파랑과 대비되는 주황 계열 + 왼쪽 강조선으로 즉시 구분 */
    .card.web { border-left: 3px solid var(--web); }
    .card.web:hover { border-color: var(--web); }
    .card.web .num { background: var(--web); }
    .card.web .type { color: var(--web); border-color: var(--web); }
    .card .title {
      font-size: 12.5px; color: var(--text); line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    /* 상품 카드 저자·가격(비웹). 저자는 흐리게, 가격은 강조색으로 스캔되게. */
    .card .info { font-size: 11.5px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card .info.author { color: var(--muted); }
    .card .info.price { color: var(--accent); font-weight: 600; }

    sup.marker {
      color: var(--accent); font-weight: 700; font-size: 0.72em; cursor: pointer;
      padding: 0 1px; vertical-align: super;
    }
    sup.marker:hover { text-decoration: underline; }
    /* 그룹 마커([2, 3, 4])나 인접 마커([1][2])가 한 숫자로 뭉쳐 보이지 않게 미세 간격 */
    sup.marker + sup.marker { margin-left: 2px; }

    /* 마크다운 헤더(###/####) — 문서 헤딩 태그 대신 본문 대비 소폭 큰 볼드 블록(축소 스타일). */
    .bubble .md-h { font-weight: 700; margin: 10px 0 2px; line-height: 1.4; }
    .bubble .md-h.l3 { font-size: 15.5px; }
    .bubble .md-h.l4 { font-size: 14.5px; }
    /* 파이프 테이블 — 말풍선 폭을 넘으면 표만 가로 스크롤(말풍선/페이지는 안 넘침).
       말풍선의 pre-wrap을 표 안에서는 해제한다(셀 텍스트가 원문 공백대로 새지 않게). */
    .bubble .md-table-wrap { overflow-x: auto; white-space: normal; margin: 8px 0; }
    .bubble .md-table { border-collapse: collapse; font-size: 13px; }
    .bubble .md-table th, .bubble .md-table td {
      border: 1px solid var(--border); padding: 4px 9px; text-align: left; white-space: nowrap;
    }
    .bubble .md-table th { background: var(--bg); font-weight: 700; }

    .composer {
      flex: 0 0 auto; border-top: 1px solid var(--border); padding: 12px;
      background: var(--panel); display: flex; gap: 8px; align-items: flex-end;
      /* 대화가 입력창 아래로 흘러드는 층위감(은은한 위쪽 그림자). */
      box-shadow: 0 -10px 20px -14px rgba(0, 0, 0, 0.18);
    }
    .composer textarea {
      flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 12px; font-size: 14.5px; font-family: inherit; background: var(--bg);
      color: var(--text); max-height: 140px; line-height: 1.5;
      transition: border-color 0.13s ease, box-shadow 0.13s ease;
    }
    .composer textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .composer textarea:disabled { opacity: 0.55; cursor: not-allowed; }
    .composer button {
      border: none; border-radius: 12px; padding: 0 16px; height: 42px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: filter 0.13s ease, opacity 0.13s ease;
    }
    .btn-send { background: var(--accent); color: #fff; }
    .btn-send:hover:not(:disabled) { filter: brightness(1.08); }
    .btn-send:disabled { opacity: 0.4; cursor: default; }
    /* 위로 스크롤해 자동추적이 꺼진 동안만 뜨는 "↓ 최신" 버튼(컴포저 위 중앙). 클릭 시 하단 복귀. */
    .jump-latest {
      position: absolute; left: 50%; transform: translateX(-50%); bottom: 78px; z-index: 5;
      background: var(--accent); color: #fff; border: none; border-radius: 999px;
      padding: 7px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .jump-latest[hidden] { display: none; }
    .btn-stop { background: transparent; color: var(--error-text); border: 1px solid var(--border) !important; }
    .btn-stop:disabled { display: none; }

    /* ── 독서 성향(RBTI) 페르소나 배지 + 선택 팝오버 ──
       헤더의 배지를 누르면 4축 이지선다 팝오버가 열린다. 미선택 시엔 배지가 회색
       "독서 성향"이고, 적용 시 4글자 코드(예: CADI)를 강조색으로 표시한다. */
    .persona-badge {
      display: inline-flex; align-items: center; gap: 5px;
    }
    .persona-badge .pb-ico { font-size: 13px; }
    .persona-badge.active {
      color: var(--accent); border-color: var(--accent); background: var(--accent-soft);
      font-weight: 700; letter-spacing: 0.08em;
    }

    /* 팝오버 바깥을 덮는 투명 백드롭 — 클릭 시 닫힘 */
    .persona-backdrop { position: fixed; inset: 0; z-index: 40; background: transparent; }
    .persona-backdrop[hidden] { display: none; }

    .persona-pop {
      position: absolute; z-index: 50; top: 56px; right: 12px;
      width: min(320px, calc(100vw - 24px));
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
    }
    .persona-pop[hidden] { display: none; }
    .pp-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .pp-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    .pp-axis { display: flex; flex-direction: column; gap: 5px; }
    .pp-axis-label { font-size: 11px; font-weight: 600; color: var(--muted); }
    .pp-opts { display: flex; gap: 6px; }
    .pp-opt {
      flex: 1 1 0; text-align: left; background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; padding: 7px 9px; cursor: pointer; color: var(--text);
      display: flex; flex-direction: column; gap: 1px; font-family: inherit;
    }
    .pp-opt:hover { border-color: var(--accent); }
    .pp-opt.sel { border-color: var(--accent); background: var(--accent-soft); }
    .pp-opt .ot { font-size: 12.5px; font-weight: 600; }
    .pp-opt .od { font-size: 10.5px; color: var(--muted); }

    .pp-code {
      text-align: center; font-size: 15px; font-weight: 700; letter-spacing: 0.35em;
      color: var(--accent); padding: 1px 0 1px 0.35em;
    }
    .pp-code.partial { color: var(--muted); }

    .pp-actions { display: flex; gap: 8px; }
    .pp-actions button {
      flex: 1 1 0; border-radius: 10px; padding: 8px 0; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .pp-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .pp-clear:hover { color: var(--text); }
    .pp-apply { background: var(--accent); border: none; color: #fff; }
    .pp-apply:disabled { opacity: 0.4; cursor: default; }

    /* 모션 민감 사용자 존중 — 애니메이션/전이 무력화(최종 상태 유지). */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <span class="logo">📚</span>
      <h1>Yes24 AI 어시스턴트</h1>
      <span class="tag">테스트</span>
      <span class="spacer"></span>
      <a id="matrix-navlink" class="navlink" href="/matrix" title="한 질문을 16가지 독서 성향으로 비교해 보기" hidden>🧭 16유형 비교</a>
      <button id="persona-badge" class="persona-badge" aria-haspopup="dialog" aria-expanded="false">
        <span class="pb-ico">📖</span><span id="persona-label">독서 성향</span>
      </button>
      <button id="new-chat">새 대화</button>
    </header>

    <div class="persona-backdrop" id="persona-backdrop" hidden></div>
    <div class="persona-pop" id="persona-pop" role="dialog" aria-label="독서 성향 선택" hidden>
      <div>
        <div class="pp-title">독서 성향 (RBTI)</div>
        <div class="pp-sub">네 축을 고르면 취향에 맞춰 답해드려요. 미선택 시 기존과 동일해요.</div>
      </div>
      <div class="pp-axes" id="pp-axes"></div>
      <div class="pp-code partial" id="pp-code">· · · ·</div>
      <div class="pp-actions">
        <button class="pp-clear" id="pp-clear">해제</button>
        <button class="pp-apply" id="pp-apply" disabled>적용</button>
      </div>
    </div>

    <div id="conversation">
      <div class="intro" id="intro">
        <div class="big">무엇을 찾아드릴까요?</div>
        <p>Yes24를 실시간으로 검색해 인용과 함께 답해드려요.</p>
        <div class="chips" id="chips"></div>
      </div>
    </div>

    <button id="jump-latest" class="jump-latest" hidden>↓ 최신</button>

    <div class="composer">
      <textarea id="input" rows="1" placeholder="메시지를 입력하세요…  (Enter 전송 · Shift+Enter 줄바꿈)"></textarea>
      <button class="btn-stop" id="stop" disabled>중지</button>
      <button class="btn-send" id="send">전송</button>
    </div>
  </div>

  <script>
    // 16유형 비교(/matrix) 네비 링크는 서버 배포 게이팅(matrix_enabled)을 따라간다.
    // 기본 hidden(fail-closed: 프로드 숨김)이고, /matrix가 살아 있을 때만(200) 노출한다.
    // 서버 플래그가 단일 진실 — 프론트는 라우트 존재 여부만 확인한다.
    (function revealMatrixLinkIfEnabled() {
      const link = document.getElementById("matrix-navlink");
      if (!link) return;
      fetch("/matrix", { method: "HEAD" })
        .then((res) => { if (res.ok) link.hidden = false; })
        .catch(() => { /* 실패 시 숨김 유지(fail-closed) */ });
    })();

    const EXAMPLES = [
      "요즘 인기 에세이 추천해줘",
      "채식주의자 얼마야?",
      "채식주의자 줄거리 알려줘",
      "무이자 할부 되는 카드 뭐 있어?",
    ];
    const STATUS_ICON = {
      thinking: "💭", searching: "🔎", searching_web: "🌐", reading: "📖",
      reading_web: "📄", browsing: "📚", retrying: "⏳", notice: "⚠️", working: "⚙️",
      verifying: "🧐",  // 무출처·얕음 게이트 재검색(사이 단계) — 재확인 중임을 표시
    };
    const TYPE_LABEL = {
      search_result: "검색결과", book_detail: "상세", detail: "상세",
      notice: "공지", policy: "공지", page: "공지", browse: "코너", web: "웹",
    };
    // 외부 웹 출처는 Yes24 출처와 시각적으로 구분해야 하므로 별도 클래스를 붙인다.
    const WEB_TYPES = new Set(["web"]);

    const conversation = document.getElementById("conversation");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const stopBtn = document.getElementById("stop");
    const newChatBtn = document.getElementById("new-chat");
    const chipsEl = document.getElementById("chips");

    // 채팅↔매트릭스 왕복(전체 페이지 네비게이션)에도 세션이 이어지도록 sessionId를
    // sessionStorage에 영속한다(페이지별 키 분리 — 매트릭스는 별도 키). 서버가 세션 히스토리를
    // DB에 갖고 있어 같은 sessionId로 이어 물으면 맥락이 유지된다. 과거 버블 복원은 스코프 밖.
    const CHAT_SESSION_KEY = "yes24_chat_session_id";
    let sessionId = null;
    try { sessionId = sessionStorage.getItem(CHAT_SESSION_KEY) || null; } catch (e) {}
    let controller = null;
    let sending = false;

    // ── 독서 성향(RBTI) 페르소나 ──
    // 4축 × 2택 = 코드 [pattern][processing][breadth][motivation] = [C/S][A/E][D/B][I/F].
    // 배열 순서가 곧 코드 자릿수 순서다(백엔드 계약). 미선택 시 rbti를 전송하지 않아 기존 동작 유지.
    const RBTI_AXES = [
      { key: "pattern", label: "1. 독서 패턴", options: [
        { code: "C", title: "정독·완독", desc: "한 권을 끝까지" },
        { code: "S", title: "발췌·탐색", desc: "여러 권 골라 읽기" } ] },
      { key: "processing", label: "2. 정보 처리", options: [
        { code: "A", title: "논리·분석", desc: "근거와 구조로" },
        { code: "E", title: "감성·공감", desc: "감정과 울림으로" } ] },
      { key: "breadth", label: "3. 취향의 폭", options: [
        { code: "D", title: "깊이·심화", desc: "한 분야 깊게" },
        { code: "B", title: "넓이·확장", desc: "여러 분야 넓게" } ] },
      { key: "motivation", label: "4. 독서 동기", options: [
        { code: "I", title: "지식·정보", desc: "배우고 얻으려" },
        { code: "F", title: "재미·즐거움", desc: "즐기고 몰입하려" } ] },
    ];
    const RBTI_STORAGE_KEY = "yes24_rbti";

    const personaBadge = document.getElementById("persona-badge");
    const personaLabel = document.getElementById("persona-label");
    const personaPop = document.getElementById("persona-pop");
    const personaBackdrop = document.getElementById("persona-backdrop");
    const ppAxes = document.getElementById("pp-axes");
    const ppCode = document.getElementById("pp-code");
    const ppApply = document.getElementById("pp-apply");
    const ppClear = document.getElementById("pp-clear");

    let rbtiCode = null;              // 적용된 코드(요청 body에 실림) 또는 null
    let pendingSel = {};              // 팝오버 진행 중 축별 선택 { pattern:"C", ... }

    // 코드 유효성: 4글자 + 축별 허용값. 무효면 null(페르소나 미적용).
    function parseRbtiCode(code) {
      if (typeof code !== "string" || code.length !== RBTI_AXES.length) return null;
      const sel = {};
      for (let i = 0; i < RBTI_AXES.length; i++) {
        const axis = RBTI_AXES[i];
        const ch = code[i];
        if (!axis.options.some((o) => o.code === ch)) return null;
        sel[axis.key] = ch;
      }
      return sel;
    }

    function deriveCode(sel) {
      // 4축이 모두 선택됐을 때만 코드 문자열, 아니면 null.
      const parts = RBTI_AXES.map((a) => sel[a.key]);
      return parts.every(Boolean) ? parts.join("") : null;
    }

    function updateBadge() {
      if (rbtiCode) {
        personaLabel.textContent = rbtiCode;
        personaBadge.classList.add("active");
      } else {
        personaLabel.textContent = "독서 성향";
        personaBadge.classList.remove("active");
      }
    }

    // 팝오버 내부(축 버튼·코드 프리뷰·적용 버튼 상태)를 pendingSel 기준으로 다시 그린다.
    function renderPopover() {
      ppAxes.textContent = "";
      for (const axis of RBTI_AXES) {
        const wrap = document.createElement("div");
        wrap.className = "pp-axis";
        const label = document.createElement("div");
        label.className = "pp-axis-label";
        label.textContent = axis.label;
        const opts = document.createElement("div");
        opts.className = "pp-opts";
        for (const opt of axis.options) {
          const btn = document.createElement("button");
          btn.className = "pp-opt" + (pendingSel[axis.key] === opt.code ? " sel" : "");
          const ot = document.createElement("span");
          ot.className = "ot";
          ot.textContent = opt.code + " · " + opt.title;
          const od = document.createElement("span");
          od.className = "od";
          od.textContent = opt.desc;
          btn.append(ot, od);
          btn.addEventListener("click", () => {
            pendingSel[axis.key] = opt.code;
            renderPopover();
          });
          opts.append(btn);
        }
        wrap.append(label, opts);
        ppAxes.appendChild(wrap);
      }
      const code = deriveCode(pendingSel);
      if (code) {
        ppCode.textContent = code.split("").join(" ");
        ppCode.classList.remove("partial");
      } else {
        // 선택된 축은 글자, 미선택 축은 · 로 표시.
        ppCode.textContent = RBTI_AXES.map((a) => pendingSel[a.key] || "·").join(" ");
        ppCode.classList.add("partial");
      }
      ppApply.disabled = !code;
    }

    function openPopover() {
      pendingSel = parseRbtiCode(rbtiCode) || {};
      renderPopover();
      personaPop.hidden = false;
      personaBackdrop.hidden = false;
      personaBadge.setAttribute("aria-expanded", "true");
    }

    function closePopover() {
      personaPop.hidden = true;
      personaBackdrop.hidden = true;
      personaBadge.setAttribute("aria-expanded", "false");
    }

    function applyPersona() {
      const code = deriveCode(pendingSel);
      if (!code) return;
      rbtiCode = code;
      try { localStorage.setItem(RBTI_STORAGE_KEY, code); } catch (e) {}
      updateBadge();
      closePopover();
    }

    function clearPersona() {
      rbtiCode = null;
      pendingSel = {};
      try { localStorage.removeItem(RBTI_STORAGE_KEY); } catch (e) {}
      updateBadge();
      closePopover();
    }

    personaBadge.addEventListener("click", () => {
      if (personaPop.hidden) openPopover(); else closePopover();
    });
    personaBackdrop.addEventListener("click", closePopover);
    ppApply.addEventListener("click", applyPersona);
    ppClear.addEventListener("click", clearPersona);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !personaPop.hidden) closePopover();
    });

    // 새로고침·새 대화에도 유지: localStorage에서 복원.
    try {
      const saved = localStorage.getItem(RBTI_STORAGE_KEY);
      if (parseRbtiCode(saved)) rbtiCode = saved;
    } catch (e) {}
    updateBadge();

    function renderChipsInto(target) {
      target.textContent = "";
      for (const ex of EXAMPLES) {
        const chip = document.createElement("button");
        chip.className = "chip";
        chip.textContent = ex;
        chip.addEventListener("click", () => { if (!sending) submit(ex); });
        target.appendChild(chip);
      }
    }

    function removeIntro() {
      const intro = document.getElementById("intro");
      if (intro) intro.remove();
    }

    // 오토스크롤 존중: 사용자가 위로 스크롤하면 자동추적을 끄고, 하단 근처로 돌아오면 다시 켠다.
    // 자동추적이 꺼진 동안엔 스트리밍이 뷰포트를 낚아채지 않아 위로 읽을 수 있고, "↓ 최신" 버튼이 뜬다.
    const SCROLL_FOLLOW_THRESHOLD_PX = 80; // 이 거리 이내로 하단에 붙어 있으면 자동추적 유지
    const jumpLatestBtn = document.getElementById("jump-latest");
    let autoFollow = true;

    function isNearBottom() {
      return conversation.scrollHeight - conversation.scrollTop - conversation.clientHeight
        <= SCROLL_FOLLOW_THRESHOLD_PX;
    }

    // force=true(사용자가 방금 메시지 전송 등)면 자동추적을 되켜고 무조건 하단으로 내린다.
    // 그 외엔 자동추적 중일 때만 따라 내려간다(위로 읽는 중이면 방해하지 않음).
    function scrollToBottom(force) {
      if (force) autoFollow = true;
      if (autoFollow) {
        conversation.scrollTop = conversation.scrollHeight;
        jumpLatestBtn.hidden = true;
      }
    }

    // 사용자 스크롤 → 하단 근접 여부로 자동추적 on/off, 버튼 표시 갱신. 프로그램적 스크롤도 이 핸들러를
    // 거치지만 하단 도달 시 near-bottom=true라 자동추적이 유지돼 자기간섭이 없다.
    conversation.addEventListener("scroll", () => {
      const near = isNearBottom();
      autoFollow = near;
      jumpLatestBtn.hidden = near;
    });

    // "↓ 최신" 클릭 — 부드럽게 하단으로(자연스러운 복귀). 자동추적 재개.
    jumpLatestBtn.addEventListener("click", () => {
      autoFollow = true;
      jumpLatestBtn.hidden = true;
      conversation.scrollTo({ top: conversation.scrollHeight, behavior: "smooth" });
    });

    function addUserMessage(text) {
      const msg = document.createElement("div");
      msg.className = "msg user";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      msg.appendChild(bubble);
      conversation.appendChild(msg);
      scrollToBottom(true); // 사용자가 방금 보냈으니 자동추적을 되켜고 하단으로 내린다.
    }

    // 어시스턴트 메시지 컨테이너를 만들고, 조작용 핸들 객체를 반환한다.
    function createAssistantMessage() {
      const msg = document.createElement("div");
      msg.className = "msg assistant";

      // 진행 과정 블록: 헤더(요약/토글) + 본문(단계·ack 응대의 시간순 스트림). 실행 중엔
      // 펼쳐서 여정을 보여주고, 완료 시 한 줄 요약으로 접는다(헤더 클릭으로 재확장).
      const trace = document.createElement("div");
      trace.className = "trace open";
      const traceHead = document.createElement("button");
      traceHead.className = "trace-head";
      traceHead.type = "button";
      const traceCaret = document.createElement("span");
      traceCaret.className = "trace-caret";
      traceCaret.textContent = "▸";
      const traceSpin = document.createElement("span");
      traceSpin.className = "trace-spin";
      const traceLabel = document.createElement("span");
      traceLabel.className = "trace-label";
      traceLabel.textContent = "진행 중…";
      traceHead.append(traceCaret, traceSpin, traceLabel);
      const traceBody = document.createElement("div");
      traceBody.className = "trace-body";
      trace.append(traceHead, traceBody);
      // 헤더 클릭 = 펼침/접힘 토글(완료 후 여정 다시 확인).
      traceHead.addEventListener("click", () => trace.classList.toggle("open"));

      const sources = document.createElement("div");
      sources.className = "sources";

      const bubble = document.createElement("div");
      bubble.className = "bubble empty";
      // 첫 델타 전 대기: 정적 "…" 대신 타이핑 인디케이터(첫 델타 시 renderBody가 걷어낸다).
      const typing = document.createElement("span");
      typing.className = "typing";
      typing.append(document.createElement("i"), document.createElement("i"), document.createElement("i"));
      bubble.appendChild(typing);

      // 본문(답변)은 진행 과정 블록·출처 카드와 시각적으로 분리 — 마커·출처·본문만.
      msg.append(trace, sources, bubble);
      conversation.appendChild(msg);
      scrollToBottom();

      const cardMap = new Map();
      let rawText = "";
      let firstDelta = false;
      let errored = false;
      let activeStep = null;   // 현재 진행 중(스핀) 단계 요소
      let lastStepKey = null;  // 직전 단계 키(연속 중복 방지)
      let sawVerifying = false; // 이번 턴에 게이트 재검색(verifying) 단계가 있었는지

      // 직전 단계를 완료 처리(스핀 정지 → 체크 아이콘).
      function completeActiveStep() {
        if (!activeStep) return;
        activeStep.classList.remove("active");
        activeStep.classList.add("done");
        const ico = activeStep.querySelector(".ico");
        if (ico) ico.textContent = "✓";
        activeStep = null;
      }

      function highlightSource(id) {
        const card = cardMap.get(String(id));
        if (!card) return;
        card.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" });
        card.classList.remove("flash");
        void card.offsetWidth; // 리플로우 강제 → 애니메이션 재시작
        card.classList.add("flash");
      }

      // [n] 및 그룹 마커 [2, 3, 4]를 파란 superscript 배지로 조립해 target에 붙인다.
      // 그룹은 내부 id별로 개별 배지를 나란히 놓아 각각 클릭할 수 있게 한다. 원문은
      // 항상 텍스트 노드/요소로만 조립한다(innerHTML 금지 — XSS 방지).
      function renderMarkersInto(target, text) {
        const re = /\[(\d+(?:\s*,\s*\d+)*)\]/g;
        let last = 0, m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > last) {
            target.appendChild(document.createTextNode(text.slice(last, m.index)));
          }
          const ids = m[1].split(",").map((s) => s.trim()).filter(Boolean);
          ids.forEach((sid) => {
            const badge = document.createElement("sup");
            badge.className = "marker";
            badge.textContent = sid;
            badge.addEventListener("click", () => highlightSource(sid));
            target.appendChild(badge);
          });
          last = re.lastIndex;
        }
        if (last < text.length) {
          target.appendChild(document.createTextNode(text.slice(last)));
        }
      }

      // 인라인 렌더: **볼드**를 <strong>으로 분리하고, 각 구간(볼드 포함) 안에서 마커 배지를
      // 조립한다. 이 순서 덕에 볼드 안의 [n]도 정상 배지로 렌더된다. innerHTML 금지(XSS 방지).
      function renderInlineInto(target, text) {
        const boldRe = /\*\*([\s\S]+?)\*\*/g;
        let last = 0, m;
        while ((m = boldRe.exec(text)) !== null) {
          if (m.index > last) {
            renderMarkersInto(target, text.slice(last, m.index));
          }
          const strong = document.createElement("strong");
          renderMarkersInto(strong, m[1]);
          target.appendChild(strong);
          last = boldRe.lastIndex;
        }
        if (last < text.length) {
          renderMarkersInto(target, text.slice(last));
        }
      }

      // 본문 렌더: 라인 단위 블록 파스 — 헤더(###/####)와 파이프 테이블만 블록으로 올리고,
      // 나머지는 인라인(볼드·마커) 평문 유지(pre-wrap). 그 외 마크다운(리스트 기호)은 스코프 밖.
      // 외부 라이브러리 없음(self-contained). 스트리밍 중엔 표가 라인이 갖춰지는 대로 승격된다.
      const MD_H_RE = /^(#{1,6})\s+(.*)$/;
      const MD_PIPE_RE = /^\s*\|.*\|\s*$/;             // |로 시작·끝나는 라인만 표 후보
      const MD_SEP_RE = /^\s*\|?[\s:|-]+\|?\s*$/;      // 구분선 |---|:--:|
      function mdSplitCells(line) {
        return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map((s) => s.trim());
      }
      function renderBody(text) {
        bubble.classList.remove("empty");
        bubble.textContent = "";
        const lines = text.split("\n");
        let buf = [];
        const flush = () => {
          // 블록 요소가 자체 줄바꿈/마진을 가지므로 세그먼트 가장자리 빈 줄은 접는다(이중 공백 방지).
          while (buf.length && !buf[0].trim()) buf.shift();
          while (buf.length && !buf[buf.length - 1].trim()) buf.pop();
          if (buf.length) renderInlineInto(bubble, buf.join("\n"));
          buf = [];
        };
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const hm = line.match(MD_H_RE);
          if (hm) {
            flush();
            const h = document.createElement("div");
            h.className = "md-h " + (hm[1].length <= 3 ? "l3" : "l4");
            renderInlineInto(h, hm[2]);
            bubble.appendChild(h);
            continue;
          }
          // 표 = 연속 파이프 라인 2줄 이상(스트리밍 중 첫 줄만 온 상태는 평문 유지).
          if (MD_PIPE_RE.test(line) && MD_PIPE_RE.test(lines[i + 1] || "")) {
            flush();
            const rows = [];
            while (i < lines.length && MD_PIPE_RE.test(lines[i])) { rows.push(lines[i]); i++; }
            i--;
            const wrap = document.createElement("div");
            wrap.className = "md-table-wrap";
            const table = document.createElement("table");
            table.className = "md-table";
            let start = 0;
            if (rows.length >= 2 && MD_SEP_RE.test(rows[1])) {
              const tr = document.createElement("tr");
              for (const c of mdSplitCells(rows[0])) {
                const th = document.createElement("th");
                renderInlineInto(th, c);
                tr.appendChild(th);
              }
              table.appendChild(tr);
              start = 2;
            }
            for (let r = start; r < rows.length; r++) {
              if (MD_SEP_RE.test(rows[r])) continue; // 표 중간 구분선은 표시 안 함
              const tr = document.createElement("tr");
              for (const c of mdSplitCells(rows[r])) {
                const td = document.createElement("td");
                renderInlineInto(td, c);
                tr.appendChild(td);
              }
              table.appendChild(tr);
            }
            wrap.appendChild(table);
            bubble.appendChild(wrap);
            continue;
          }
          buf.push(line);
        }
        flush();
      }

      // 표지 URL은 두 형태로 온다: 스트리밍 source 이벤트는 image_url 평면 필드,
      // done.sources는 meta.image_url. http(s)만 허용(안전).
      function coverUrl(src) {
        const u = src.image_url || (src.meta && src.meta.image_url);
        return u && /^https?:\/\//i.test(u) ? u : null;
      }

      function makeCard(src) {
        const isWeb = WEB_TYPES.has(src.type);
        const card = document.createElement("div");
        card.className = isWeb ? "card web" : "card";

        // 좌측 표지 썸네일(있을 때만). matrix 셀과 같은 결: decoding=async, loading=lazy 금지
        // (스크롤 없는 뷰포트에서 lazy가 로드를 멈추는 Chrome 쿼크 — matrix-ux 실측), 실패 시
        // 이미지를 제거해 깨진 아이콘 대신 본문만 남긴다. 없으면 현행 그대로(표지 없음).
        const url = coverUrl(src);
        if (url) {
          const cover = document.createElement("img");
          cover.className = "cover";
          cover.decoding = "async";
          cover.alt = "";
          cover.addEventListener("error", () => cover.remove());
          card.appendChild(cover);
          cover.src = url; // 핸들러 등록 후 src 설정
        }

        const main = document.createElement("div");
        main.className = "card-main";
        const top = document.createElement("div");
        top.className = "top";
        const num = document.createElement("span");
        num.className = "num";
        num.textContent = src.id;
        const type = document.createElement("span");
        type.className = "type";
        type.textContent = TYPE_LABEL[src.type] || "검색결과";
        top.append(num, type);
        const title = document.createElement("div");
        title.className = "title";
        title.textContent = src.title || "(제목 없음)";
        main.append(top, title);
        // 상품 카드(비웹)엔 저자·가격을 노출한다. 데이터가 오는 형태가 둘이라 관대하게 읽는다:
        // 스트리밍 source 이벤트는 author/price 평면 필드, done.sources는 snippet(저자)/meta.price.
        // 값이 없으면 placeholder 없이 그 줄을 생략한다.
        if (!isWeb) {
          const author = src.author || src.snippet;
          const priceRaw = (src.price != null) ? src.price : (src.meta && src.meta.price);
          if (author) {
            const au = document.createElement("div");
            au.className = "info author";
            au.textContent = author;
            main.append(au);
          }
          if (priceRaw != null && priceRaw !== "") {
            const pr = document.createElement("div");
            pr.className = "info price";
            // 숫자면 천단위 콤마+원, 이미 문자열이면 그대로(도구가 문자열 가격을 줄 여지 대비).
            const n = Number(priceRaw);
            pr.textContent = Number.isFinite(n) && n > 0
              ? n.toLocaleString("ko-KR") + "원"
              : String(priceRaw);
            main.append(pr);
          }
        }
        card.appendChild(main);
        // http(s) 스킴만 허용 — 출처 url(특히 web_search가 준 외부 url)에 javascript:
        // 같은 스킴이 섞이면 window.open으로 스크립트가 실행될 수 있어 방어한다.
        if (src.url && /^https?:\/\//i.test(src.url)) {
          card.addEventListener("click", () => window.open(src.url, "_blank", "noopener"));
        }
        return card;
      }

      // 진행 과정 블록을 완료 요약으로 접는다(완료·에러 시). 스피너를 멈추고 캐럿만 남긴다.
      function collapseTrace(summary) {
        trace.classList.remove("open");
        trace.classList.add("done");
        traceLabel.textContent = summary;
      }

      return {
        setAck(text) {
          // 도구 호출 직전 응대(공감·의도). 진행 과정 스트림에 status 단계와 시간순으로 섞어
          // 자연어 응대 항목으로 쌓는다. 빈 텍스트는 무시(백엔드가 빈 ack를 안 보내지만 방어).
          if (!text) return;
          const item = document.createElement("div");
          item.className = "ack-item";
          const ico = document.createElement("span");
          ico.className = "ico";
          ico.textContent = "💬";
          const label = document.createElement("span");
          label.textContent = text;
          item.append(ico, label);
          traceBody.appendChild(item);
          scrollToBottom();
        },
        setStatus(stage, detail) {
          // 게이트 재검색 단계를 기록해 둔다(중복 필터보다 먼저) — finalize에서 본문이
          // 더 정확한 답으로 교체될 때 이 단계와 시각적으로 연결한다(버그 #1: 스왑 놀람 제거).
          if (stage === "verifying") sawVerifying = true;
          // 연속 동일 단계는 중복 추가하지 않는다(같은 도구가 상태만 반복 전송하는 경우).
          const key = stage + "|" + (detail || "");
          if (key === lastStepKey) return;
          lastStepKey = key;
          // 직전 단계를 완료로 마감하고 새 단계를 진행 과정 스트림에 누적한다(덮어쓰지 않음).
          completeActiveStep();
          const step = document.createElement("div");
          step.className = "step active";
          const ico = document.createElement("span");
          ico.className = "ico";
          ico.textContent = STATUS_ICON[stage] || "•";
          const label = document.createElement("span");
          label.textContent = detail || "";
          step.append(ico, label);
          traceBody.appendChild(step);
          activeStep = step;
          // 헤더는 실행 중 제네릭 "진행 중…"으로 둔다(개별 단계는 본문 스트림에만). 헤더가
          // 최신 단계를 미러링하면 펼친 상태에서 헤더=본문 첫 줄이 같은 문구로 겹쳐 보인다.
          // 게이트 재검색(verifying)은 타임라인의 verifying 단계 라벨("정확한 정보를 찾아 다시
          // 확인하고 있어요")로만 알린다. 답변 본문은 정상 색으로 두고(흐림 없음), 재검색 완료 시
          // done.text가 더 정확한 답으로 교체한다 — 본문 흐림은 비활성/미완성으로 오인돼 제거했다.
          scrollToBottom();
        },
        addSource(src) {
          if (cardMap.has(String(src.id))) return;
          const card = makeCard(src);
          cardMap.set(String(src.id), card);
          sources.appendChild(card);
          scrollToBottom();
        },
        appendDelta(chunk) {
          if (!firstDelta) {
            firstDelta = true;
            // 답변 스트리밍 시작 → 진행 중 단계를 완료 처리한다(접힘은 finalize가 요약과 함께).
            completeActiveStep();
          }
          rawText += chunk;
          renderBody(rawText);
          scrollToBottom();
        },
        finalize(payload, elapsedSec) {
          // error로 끝난 턴이면(백엔드가 error 뒤 done을 함께 보냄) 빨간 안내 말풍선을
          // 그대로 두고 "응답 X초" meta를 붙이지 않는다.
          if (errored) return;
          if (typeof payload.text === "string" && payload.text.length) {
            // 게이트 재검색으로 본문이 교체되는 경우(스트리밍된 rawText와 done.text가 다르고
            // 이번 턴에 verifying 단계가 있었음), 통째 갈아끼우는 놀람 대신 안내줄 + 페이드인으로
            // 부드럽게 전이한다. verifying이 없었으면(인용 마커 정리 등 미세 diff) 조용히 교체한다.
            const swapped = sawVerifying && payload.text !== rawText;
            rawText = payload.text;
            renderBody(rawText);
            if (swapped) {
              const note = document.createElement("div");
              note.className = "update-note";
              const ico = document.createElement("span");
              ico.className = "ico";
              ico.textContent = "↻";
              const label = document.createElement("span");
              label.textContent = "더 정확한 정보로 업데이트했어요";
              note.append(ico, label);
              bubble.parentNode.insertBefore(note, bubble);
              bubble.classList.remove("updated");
              void bubble.offsetWidth; // 리플로우 강제 → 애니메이션 재시작
              bubble.classList.add("updated");
            }
          }
          // 출처칩 = 이번 턴 참고한 출처(관찰). 스트리밍 중 그린 관찰 카드는 그대로 두고,
          // 그중 실제 인용된 것(cited_ids)만 강조·나머지는 디밍한다. (이전엔 done.sources로
          // 카드를 재구성해 관찰 카드가 사라졌다 — 카드 소멸 버그. done.text의 [n] 인용 무결성은
          // 불변이고, 여기선 표시만 바꾼다.)
          const citedIds = new Set(
            (Array.isArray(payload.cited_ids) ? payload.cited_ids : []).map(String)
          );
          // 인용됐지만 스트리밍 중 카드가 안 그려진 출처(게이트 재검색 등)는 done.sources로 보강한다.
          const finalSources = Array.isArray(payload.sources) ? payload.sources : [];
          for (const src of finalSources) {
            if (!cardMap.has(String(src.id))) {
              const card = makeCard(src);
              cardMap.set(String(src.id), card);
              sources.appendChild(card);
            }
            citedIds.add(String(src.id));
          }
          // 인용 카드는 강조, 비인용 관찰 카드는 디밍. 인용이 하나도 없으면 디밍하지 않는다
          // (관찰만 있고 인용 0인 턴에서 전부 흐려지는 걸 방지).
          const hasCited = citedIds.size > 0;
          for (const [id, card] of cardMap) {
            card.classList.toggle("cited", citedIds.has(id));
            card.classList.toggle("dim", hasCited && !citedIds.has(id));
          }
          // 인용 카드를 앞으로 재배치(강조 우선 노출, 가로 스크롤 유지). appendChild는 이동시킨다.
          if (hasCited) {
            for (const [id, card] of cardMap) if (citedIds.has(id)) sources.appendChild(card);
            for (const [id, card] of cardMap) if (!citedIds.has(id)) sources.appendChild(card);
          }
          // 진행 과정 블록을 한 줄 요약으로 접는다(클릭 시 여정 재확인). 단계 수는 status
          // 단계(.step)만 세고 ack 응대는 제외한다. 기존 별도 meta 라인은 이 요약으로 통합.
          completeActiveStep();
          const stepCount = traceBody.querySelectorAll(".step").length;
          // 출처 0인 턴(파라메트릭 즉답)은 "N단계 탐색"이 근거 있는 검색처럼 읽히는 착시를
          // 만든다 — 중립 표기("응답 X초")로만 접는다. 출처가 있을 때만 탐색·출처 요약.
          if (cardMap.size) {
            const parts = [];
            if (stepCount) parts.push(`${stepCount}단계 탐색`);
            parts.push(`출처 ${cardMap.size}개`);
            parts.push(`${elapsedSec.toFixed(1)}초`);
            collapseTrace("🔍 " + parts.join(" · "));
          } else {
            collapseTrace(`응답 ${elapsedSec.toFixed(1)}초`);
          }
          scrollToBottom();
        },
        showError(message) {
          errored = true;
          completeActiveStep();
          collapseTrace("⚠️ 오류로 중단됨");
          bubble.className = "bubble error";
          bubble.textContent = message || "오류가 발생했어요.";
          scrollToBottom();
        },
        markEmptyIfUntouched() {
          // 에러 말풍선은 그대로 둔다(안내 문구를 덮어쓰지 않는다).
          if (!rawText && !errored) {
            bubble.classList.remove("empty");
            bubble.textContent = "(응답이 없었어요)";
          }
        },
      };
    }

    // SSE 이벤트 블록(event:/data:)을 파싱한다.
    function parseEvent(block) {
      let event = "message";
      let data = "";
      for (const line of block.split("\n")) {
        if (line.startsWith("event:")) event = line.slice(6).trim();
        else if (line.startsWith("data:")) data += line.slice(5).trim();
      }
      let parsed = {};
      if (data) {
        try { parsed = JSON.parse(data); } catch (e) { parsed = {}; }
      }
      return { event, data: parsed };
    }

    // 전송 버튼 상태: 전송 중이거나 입력이 비면 비활성(보낼 게 없을 때 활성처럼 보이지 않게).
    function updateSendState() {
      sendBtn.disabled = sending || input.value.trim() === "";
    }

    function setSending(on) {
      sending = on;
      stopBtn.disabled = !on;
      input.disabled = on;
      updateSendState();
      if (!on) input.focus();
    }

    async function submit(text) {
      const message = (text !== undefined ? text : input.value).trim();
      if (!message || sending) return;

      removeIntro();
      addUserMessage(message);
      input.value = "";
      input.style.height = "auto";

      const asst = createAssistantMessage();
      asst.setStatus("thinking", "질문을 확인하고 있어요");
      setSending(true);

      controller = new AbortController();
      const started = performance.now();

      try {
        // 페르소나 미선택(rbtiCode=null) 시 rbti 필드를 아예 싣지 않아 기존 UX 100% 무변.
        const payload = { message, session_id: sessionId };
        if (rbtiCode) payload.rbti = rbtiCode;
        const resp = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          signal: controller.signal,
        });
        if (!resp.ok || !resp.body) {
          throw new Error("서버 응답 오류: " + resp.status);
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buffer.indexOf("\n\n")) >= 0) {
            const block = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            if (!block.trim()) continue;
            const { event, data } = parseEvent(block);
            if (event === "ack") {
              asst.setAck(data.text || "");
            } else if (event === "status") {
              asst.setStatus(data.stage, data.detail);
            } else if (event === "source") {
              asst.addSource(data);
            } else if (event === "delta") {
              asst.appendDelta(data.text || "");
            } else if (event === "done") {
              if (data.session_id) {
                sessionId = data.session_id;
                try { sessionStorage.setItem(CHAT_SESSION_KEY, sessionId); } catch (e) {}
              }
              asst.finalize(data, (performance.now() - started) / 1000);
            } else if (event === "error") {
              asst.showError(data.message);
            }
          }
        }
        asst.markEmptyIfUntouched();
      } catch (err) {
        if (err && err.name === "AbortError") {
          asst.showError("응답을 중지했어요.");
        } else {
          asst.showError("연결에 문제가 있었어요. 잠시 후 다시 시도해 주세요.");
        }
      } finally {
        controller = null;
        setSending(false);
      }
    }

    sendBtn.addEventListener("click", () => submit());
    stopBtn.addEventListener("click", () => { if (controller) controller.abort(); });
    newChatBtn.addEventListener("click", () => {
      if (sending && controller) controller.abort();
      sessionId = null;
      try { sessionStorage.removeItem(CHAT_SESSION_KEY); } catch (e) {}
      conversation.textContent = "";
      const intro = document.createElement("div");
      intro.className = "intro";
      intro.id = "intro";
      intro.innerHTML = '<div class="big">무엇을 찾아드릴까요?</div>' +
        '<p>Yes24를 실시간으로 검색해 인용과 함께 답해드려요.</p>';
      const chips = document.createElement("div");
      chips.className = "chips";
      chips.id = "chips";
      intro.appendChild(chips);
      conversation.appendChild(intro);
      renderChipsInto(chips);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 140) + "px";
      updateSendState();
    });

    // 컴포저 밖에서 타이핑 시작 → 포커스만 컴포저로 옮기고 글자 삽입은 브라우저 기본 동작에
    // 맡긴다. 문자를 직접 삽입하는 릴레이는 공백·문장부호·Enter·한글 IME 조합을 흘리므로 금지.
    // Enter·화살표 등 비프린터블은 릴레이하지 않는다(포커스된 버튼의 기본 동작 보존).
    function isEditableTarget(el) {
      return !!el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.isContentEditable);
    }
    document.addEventListener("keydown", (e) => {
      if (e.defaultPrevented || e.ctrlKey || e.metaKey || e.altKey) return;
      if (isEditableTarget(e.target)) return;
      if (!personaPop.hidden) return; // 팝오버 열림 — 팝오버 키 조작 우선
      if (input.disabled) return;     // 전송 중
      // 프린터블 1글자(공백·문장부호 포함) 또는 IME 조합 키(한글 첫 타, e.key="Process").
      if (e.key.length === 1 || e.key === "Process") input.focus();
    });

    // 매트릭스 "이 성향으로 채팅하기" 핸드오프: 채택한 셀의 {질문, 답변 요지(대표책)}를
    // 컴포저에 *보이는* 프리필로 얹는다 — 숨은 컨텍스트 주입 금지(사용자가 보는 것 = 모델이
    // 받는 것). 1회성: 읽는 즉시 제거해 새로고침 시 반복 프리필을 막는다.
    const MATRIX_HANDOFF_KEY = "yes24_matrix_handoff";
    (function applyMatrixHandoff() {
      let handoff = null;
      try {
        const raw = localStorage.getItem(MATRIX_HANDOFF_KEY);
        if (raw) { handoff = JSON.parse(raw); localStorage.removeItem(MATRIX_HANDOFF_KEY); }
      } catch (e) {}
      if (!handoff || !handoff.question) return;
      const what = handoff.pick ? "『" + handoff.pick + "』 추천" : "답변";
      const persona = handoff.code ? handoff.code + " 성향으로 " : "";
      input.value = "방금 \"" + handoff.question + "\" 질문에 " + persona + what + "을 받았어요. ";
      input.setSelectionRange(input.value.length, input.value.length); // 이어서 바로 타이핑
      input.dispatchEvent(new Event("input")); // 높이·전송버튼 상태 갱신
    })();

    renderChipsInto(chipsEl);
    input.focus();
    updateSendState(); // 초기: 입력이 비어 있으니 전송 비활성
  </script>
</body>
</html>
